# Server Configuration
server.port=5000

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:qlbv;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (enable for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=QuanLyBenhVienSecretKey2024VeryLongKeyForJWTTokenGeneration12345
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5001

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.hospital.qlbv=DEBUG
